<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body>
    <div class="container mt-5">
      <label for="range1" class="form-label">Example range</label>
      <input type="range" class="form-range" id="range1">  
    </div>
    <div class="container mt-5">
        <form>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="text" id="email" class="form-control" placeholder="Enter your email" aria-describedby="emailInformation"/>
                <div class="form-text" id="emailInformation">we will never share your information</div>

            </div>
            <div class="mb-3">
                <label for="pssward" class="form-label">Email</label>
                <input type="password" id="passward" class="form-control" placeholder="Enter your password" aria-describedby="passward"/>
                <div class="form-text" id="passward">we will never share your information</div>
                
                
            </div>
            <div class="mb-3">
              <label for="formFile" class="form-label">Default file input example</label>
             <input class="form-control"   type="file" id="formFile">
             </div>
             <select class="form-select" aria-label="Default select example">
           <option selected>Open this select menu</option>
           <option value="1">One</option>
           <option value="2">Two</option>
            <option value="3">Three</option>
            </select>
            <div class="mb-3">
                <label for="textarea" class="form-label">Textarea</label>
                <textarea class="form-control" id="textarea" rows="3"></textarea>
            </div>
            
            <button class="btn btn-success ">Submit</button>
        </form>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
